alert:
  channel: none
  feishu_webhook: ''
  webhook_url: ''
api:
  api_key: your-api-key-here
  base_url: https://api.openai.com/v1
  chat_model: gpt-4o-mini
  embedding_model: text-embedding-3-small
  provider: openai
compression:
  auto_threshold: 0.85
  budget_chars: 2000
  enabled: true
  mild_threshold: 0.7
  warn_language: zh
  warn_threshold: 0.7
forgetting_curve:
  archive_days: 60
  demote_days: 14
  density_window: 20
  enabled: true
  min_keyword_length: 3
  scene_protection_days: 7
learner:
  correction_signals:
  - "\u4E0D\u662F"
  - "\u4E0D\u5BF9"
  - "\u9519\u4E86"
  - "\u5E94\u8BE5\u662F"
  - "\u4E0D\u8981"
  - "\u8BB0\u4F4F"
  - "\u6211\u544A\u8BC9\u8FC7\u4F60"
  - "\u6211\u8BF4\u8FC7"
  - "\u522B"
  - "\u522B\u518D"
  - "\u4F60\u53C8"
  - "\u8FD8\u8BF4"
  - 'no'
  - wrong
  - don't
  - stop
  - hey
  - remember
  - i told you
  - not
  - never
  - hold on
  - wait
  - actually
  - correction
  enabled: true
memory:
  storage_path: ./memory_data
  weights:
    keyword: 0.3
    recency: 0.2
    semantic: 0.5
security:
  encryption:
    enabled: false
  isolation:
    default_user: default
    enabled: false
  lockout_minutes: 30
  lockout_threshold: 3
