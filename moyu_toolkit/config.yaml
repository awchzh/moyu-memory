alert:
  channel: none
  feishu_webhook: ''
  webhook_url: ''
api:
  api_key: your-api-key-here
  base_url: https://api.openai.com/v1
  chat_model: gpt-4o-mini
  embedding_model: text-embedding-3-small
  provider: openai
compression:
  auto_threshold: 0.85
  budget_chars: 2000
  enabled: true
  mild_threshold: 0.7
  warn_language: zh
  warn_threshold: 0.7
forgetting_curve:
  archive_days: 60
  demote_days: 14
  density_window: 20
  enabled: true
  min_keyword_length: 3
  scene_protection_days: 7
learner:
  correction_signals:
  - 不是
  - 不对
  - 错了
  - 应该是
  - 不要
  - 记住
  - 我告诉过你
  - 我说过
  - 别
  - 别再
  - 你又
  - 还说
  - 'no'
  - wrong
  - don't
  - stop
  - hey
  - remember
  - i told you
  - not
  - never
  - hold on
  - wait
  - actually
  - correction
  enabled: true
memory:
  storage_path: ./memory_data
  weights:
    keyword: 0.3
    recency: 0.2
    semantic: 0.5
security:
  encryption:
    enabled: false
  isolation:
    default_user: default
    enabled: false
  lockout_minutes: 30
  lockout_threshold: 3
